name: Backend Tests

# 1. ¿Cuándo se ejecuta?
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  php-tests:
    runs-on: ubuntu-latest

    # 2. Definir servicios (Base de Datos)
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      # 3. Descargar el código del repo
      - uses: actions/checkout@v4

      # 4. Configurar versión de PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql
          coverage: xdebug

      # 5. Instalar dependencias (con caché para ir más rápido)
      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress

      # 6. Ejecutar las pruebas
      - name: Run Unit & Integration Tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing_db
          DB_USERNAME: root
          DB_PASSWORD: root
        run: ./vendor/bin/phpunit
