name: CI Nebula Auto-Testing

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalación de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, mysql, curl, json
          ini-values: display_errors=On, error_reporting=E_ALL

      - name: Instalación de Dependencias
        run: composer install --prefer-dist --no-progress

      - name: Crear archivo .env desde Secrets
        # Este paso es VITAL: toma tus Action Secrets y los mete en un .env temporal
        # que solo existe durante el test en GitHub.
        run: |
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_USER=root" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_PORT=3306" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "TOKEN_TTL_SECONDS=86400" >> .env

      - name: Importar Base de Datos
        run: mysql -h 127.0.0.1 -u root -p${{ secrets.DB_PASSWORD }} ${{ secrets.DB_NAME }} < database/init.sql
        
      - name: Levantar Servidor API
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: root
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }} # ¡Asegúrate de que esto esté aquí!
        run: php -S 127.0.0.1:8000 -t public public/index.php > php_server.log 2>&1 &

      - name: Esperar a que el servidor responda
        run: |
          timeout 30s bash -c 'until curl -s localhost:8000 > /dev/null; do sleep 1; done'
          echo "Servidor listo!"

      - name: Ejecutar PHPUnit
        run: ./vendor/bin/phpunit --colors=always tests/Feature/ConnectionTest.php

      - name: Logs de error en caso de fallo
        if: failure()
        run: |
          echo "--- LOG DE PHP ---"
          cat php_server.log
