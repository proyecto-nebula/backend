name: CI Nebula Auto-Testing

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          # Usamos los secretos que ya tienes configurados
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalación de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, mysql, curl, json

      - name: Instalación de Dependencias
        run: composer install --prefer-dist --no-progress

      - name: Configuración de Entorno (.env)
        run: |
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_PORT=3306" >> .env
          echo "JWT_SECRET=${{ secrets.JWR_SECRET }}" >> .env

      - name: Importar Base de Datos
        # Cambia 'database/schema.sql' por la ruta real de tu archivo SQL
        run: mysql -h 127.0.0.1 -u root -proot Nebula_db < database/init.sql 
        if: always() # Para asegurar que intente importar aunque falte algo

      - name: Levantar Servidor API
        # IMPORTANTE: Usamos public/index.php como router para evitar 404
        run: php -S 127.0.0.1:8000 -t public public/index.php & 

      - name: Esperar a que el servidor esté listo
        run: sleep 3

      - name: Ejecutar Pruebas Automáticas
        # Ejecutamos el Test Maestro que creamos para todos los endpoints
        run: ./vendor/bin/phpunit --colors=always tests/Feature
