openapi: 3.0.3
info:
  title: Nebula API
  version: 1.0.0
  description: API REST de Nebula con payloads directos en éxito y code/message en error.
servers:
  - url: http://localhost:8000/api/v1
    description: Local

tags:
  - name: Auth
  - name: Users
  - name: Games
  - name: Avatars
  - name: Screenshots
  - name: Categories
  - name: Studios
  - name: Favorites
  - name: GameCategories
  - name: Sessions
  - name: Pegi
  - name: Roles
  - name: Plans
  - name: Health

security:
  - bearerAuth: []

paths:
  /auth:
    post:
      tags: [Auth]
      summary: Login y emisión de token JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '201':
          description: Token generado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '403':
          $ref: '#/components/responses/Error403'
        '405':
          $ref: '#/components/responses/Error405'

  /test:
    get:
      tags: [Health]
      summary: Comprobación rápida del router
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: El Router MVC funciona correctamente

  /users:
    get:
      tags: [Users]
      summary: Listar usuarios
      responses:
        '200':
          $ref: '#/components/responses/SuccessArray'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '405':
          $ref: '#/components/responses/Error405'
    post:
      tags: [Users]
      summary: Crear usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericInput'
      responses:
        '201':
          $ref: '#/components/responses/CreatedID'
        '400':
          $ref: '#/components/responses/Error400'
        '405':
          $ref: '#/components/responses/Error405'

  /users/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    get:
      tags: [Users]
      summary: Obtener detalle de usuario
      responses:
        '200':
          $ref: '#/components/responses/SuccessObject'
        '404':
          $ref: '#/components/responses/Error404'
    put:
      tags: [Users]
      summary: Actualización completa de usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericInput'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/Error400'
    patch:
      tags: [Users]
      summary: Actualización parcial de usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericInput'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
