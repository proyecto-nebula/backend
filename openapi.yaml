openapi: 3.0.3
info:
  title: Nebula API
  version: 1.1.0
  description: |
    API REST de Nebula.

    Notas importantes de contrato:
    - En respuestas OK, el backend devuelve directamente el payload (sin envoltorio result/data).
    - En errores, el backend devuelve `{ code, message }`.
    - Las claves se devuelven en camelCase: `id`, `url`, etc.
    - Los endpoints protegidos requieren `Authorization: Bearer <token>`.

servers:
  - url: http://localhost:8000/api/v1
    description: Local

tags:
  - name: Auth
  - name: Health
  - name: Users
  - name: Games
  - name: Avatars
  - name: Screenshots
  - name: Categories
  - name: Studios
  - name: Favorites
  - name: GameCategories
  - name: Sessions
  - name: Pegi
  - name: Roles
  - name: Plans

security:
  - bearerAuth: []

paths:
  /auth:
    post:
      tags: [Auth]
      summary: Login y emision de JWT
      description: |
        Valida email/password y devuelve un token JWT.
        Si el login es correcto, tambien actualiza `users.last_login_at`.
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
            examples:
              credencialesValidas:
                value:
                  email: admin@ejemplo.com
                  password: admin
      responses:
        '201':
          description: Token generado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
              examples:
                ok:
                  value:
                    token: <JWT_TOKEN>
        '400':
          $ref: '#/components/responses/Error400'
        '403':
          description: Credenciales invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                credencialesIncorrectas:
                  value:
                    code: FORBIDDEN
                    message: El email y/o la contrasena son incorrectas
        '405':
          $ref: '#/components/responses/Error405'

  /test:
    get:
      tags: [Health]
      summary: Comprobacion del router
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: API operativa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                ok:
                  value:
                    status: success
                    message: El Router MVC funciona correctamente

