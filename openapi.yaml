components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  responses:
    SuccessArray:
      description: Operación correcta con lista
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/GenericObject'
    SuccessObject:
      description: Operación correcta con objeto
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GenericObject'
    CreatedID:
      description: Recurso creado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreatedIDResponse'
    NoContent:
      description: Operación correcta sin cuerpo
    Error400:
      description: Solicitud inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error401:
      description: No autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error403:
      description: Sin permisos o token inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error404:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error405:
      description: Método no permitido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    GenericObject:
      type: object
      additionalProperties: true

    GenericInput:
      type: object
      additionalProperties: true
      description: Payload genérico. Se recomienda sustituir por DTOs concretos en una iteración posterior.

    CreatedIDResponse:
      type: object
      required: [ID]
      properties:
        ID:
          type: integer
          example: 123

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: Error en la solicitud

    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: usuario@ejemplo.com
        password:
          type: string
          format: password
          example: secreto123

    AuthLoginResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          example: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
