                      avatarId: 5
                      birthDate: 1995-08-22
                      isActive: true
                      createdAt: 2026-04-07 11:35:29
                      lastLoginAt: 2026-04-23 09:12:44
        '401':
          $ref: '#/components/responses/Error401'
        '405':
          $ref: '#/components/responses/Error405'
    post:
      tags: [Users]
      summary: Crear usuario
      operationId: usersCreate
