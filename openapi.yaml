                  password: secreto123
                  email: nuevo@ejemplo.com
                  roleID: 1
                  planID: 0
                  avatarID: 3
                  birthDate: 2000-01-15
      responses:
        '201':
          $ref: '#/components/responses/CreatedID'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '405':
          $ref: '#/components/responses/Error405'

