components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1

  responses:
    CreatedID:
      description: Recurso creado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreatedIDResponse'
          examples:
            creado:
              value:
                ID: 123

    NoContent:
      description: Operacion correcta sin contenido

    Error400:
      description: Solicitud invalida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validacion:
              value:
                code: VALIDATION_ERROR
                message: Error en la solicitud

    Error401:
      description: No autenticado o token invalido/expirado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            sinToken:
              value:
                code: UNAUTHORIZED
                message: Usted no tiene los permisos para esta solicitud (Falta Authorization Bearer)
            tokenInvalido:
              value:
                code: UNAUTHORIZED
                message: Token invalido o expirado

    Error404:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            noEncontrado:
              value:
                code: NOT_FOUND
                message: Usuario no encontrado

    Error405:
      description: Metodo no permitido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            metodo:
              value:
                code: METHOD_NOT_ALLOWED
                message: Metodo no permitido

  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Error en la solicitud

    CreatedIDResponse:
      type: object
      required: [id]
      properties:
        id:
          type: integer
          example: 321

    HealthResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: El Router MVC funciona correctamente

    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: usuario@ejemplo.com
        password:
          type: string
          format: password
          example: admin

    AuthLoginResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          example: <JWT_TOKEN>

    User:
      type: object
      properties:
        id:
          type: integer
        planId:
          type: integer
          nullable: true
        roleId:
          type: integer
          nullable: true
        avatarId:
          type: integer
          nullable: true
        username:
          type: string
        email:
          type: string
          format: email
        birthDate:
          type: string
          format: date
          nullable: true
        lastLoginAt:
          type: string
          nullable: true
          description: Timestamp de ultimo login
          example: 2026-04-23 09:12:44
        isActive:
          type: boolean
        createdAt:
          type: string
          example: 2026-04-07 11:35:29

    UserCreateRequest:
      type: object
      required: [username, password, email]
      properties:
        username:
          type: string
          maxLength: 50
        password:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        roleID:
          type: integer
          nullable: true
        planID:
          type: integer
          nullable: true
        avatarID:
          type: integer
          nullable: true
